<!DOCTYPE html>
<html>
<head>
    <title>小东页面测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .pass { background: #d4edda; }
        .fail { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>小东页面诊断测试</h1>
    
    <div class="test" id="test1">
        <h3>测试1: 访问GitHub Pages</h3>
        <p>状态: <span id="status1">测试中...</span></p>
    </div>
    
    <div class="test" id="test2">
        <h3>测试2: 加载JS文件</h3>
        <p>状态: <span id="status2">测试中...</span></p>
    </div>
    
    <div class="test" id="test3">
        <h3>测试3: 本地开发服务器</h3>
        <p>地址: <a href="http://localhost:3001" target="_blank">http://localhost:3001</a></p>
        <p>网络地址: <a href="http://192.168.0.52:3001" target="_blank">http://192.168.0.52:3001</a></p>
    </div>
    
    <div class="test">
        <h3>解决方案</h3>
        <ol>
            <li><strong>方案A</strong>: 访问 <a href="http://localhost:3001" target="_blank">本地开发服务器</a></li>
            <li><strong>方案B</strong>: 访问 <a href="http://192.168.0.52:3001" target="_blank">网络地址</a> (同一网络)</li>
            <li><strong>方案C</strong>: 使用 <strong>ngrok</strong> 创建公开链接</li>
            <li><strong>方案D</strong>: 部署到 <strong>Vercel</strong> (更稳定)</li>
        </ol>
    </div>

    <script>
        // 测试1: 检查GitHub Pages访问
        fetch('https://yancyfeng999-star.github.io/xiaodong-dashboard/')
            .then(response => {
                const elem = document.getElementById('status1');
                if (response.ok) {
                    elem.textContent = '✅ 可访问 (HTTP ' + response.status + ')';
                    document.getElementById('test1').classList.add('pass');
                } else {
                    elem.textContent = '❌ 访问失败 (HTTP ' + response.status + ')';
                    document.getElementById('test1').classList.add('fail');
                }
            })
            .catch(error => {
                document.getElementById('status1').textContent = '❌ 网络错误: ' + error.message;
                document.getElementById('test1').classList.add('fail');
            });

        // 测试2: 检查JS文件加载
        fetch('https://yancyfeng999-star.github.io/xiaodong-dashboard/assets/index-BGUVrhud.js')
            .then(response => {
                const elem = document.getElementById('status2');
                if (response.ok) {
                    elem.textContent = '✅ JS文件可加载 (大小: ' + (response.headers.get('content-length') / 1024).toFixed(1) + 'KB)';
                    document.getElementById('test2').classList.add('pass');
                } else {
                    elem.textContent = '❌ JS文件加载失败 (HTTP ' + response.status + ')';
                    document.getElementById('test2').classList.add('fail');
                }
            })
            .catch(error => {
                document.getElementById('status2').textContent = '❌ JS文件网络错误: ' + error.message;
                document.getElementById('test2').classList.add('fail');
            });
    </script>
</body>
</html>
